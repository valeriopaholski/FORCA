
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forca v6</title>
<style>
body{font-family:Arial;text-align:center}
.card{border:1px solid #ccc;margin:10px;padding:10px;border-radius:10px}
</style>
</head>
<body>
<h2>Forca v6</h2>

<div id="menu">
<input id="name" placeholder="Nome"><br>
<input id="room" placeholder="Sala"><br>
<button onclick="joinRoom()">Entrar / Criar</button>
</div>

<div id="game" style="display:none">
<h3 id="players"></h3>

<input id="word"><button onclick="setWord()">Minha Palavra</button>

<div id="boards"></div>

<input id="letter" maxlength="1">
<button onclick="guess()">Chutar</button>

<div id="scores"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
