<!DOCTYPE html>
<html lang='pt-br'>
<head>
<meta charset='UTF-8'>
<title>Forca Online V14</title>
<style>
body{font-family:Arial;background:#1e73d8;margin:0;padding:20px;text-align:center}
.card{background:#fff;padding:20px;border-radius:10px;display:inline-block;min-width:300px}
button{background:#fff;color:#1e73d8;border:2px solid #1e73d8;padding:10px;margin:5px;border-radius:6px;font-weight:bold;cursor:pointer}
button:hover{background:#1e73d8;color:#fff}
#word{font-size:28px;letter-spacing:8px;margin:10px}
#hang{white-space:pre;font-family:monospace}
.turn{font-weight:bold;margin:10px}
.green{color:green}
.orange{color:orange}
</style>
</head>
<body>
<div class='card' id='menu'>
<h2>Forca Online</h2>
<input id='name' placeholder='Nome'>
<input id='room' placeholder='Sala'>
<br>
<button onclick='joinRoom()'>Entrar</button>
</div>

<div class='card' id='game' style='display:none'>
<div id='players'></div>
<div id='turn' class='turn'></div>
<input id='setWord'>
<button onclick='saveWord()'>Salvar Palavra</button>
<div id='word'></div>
<div id='hang'></div>
<input id='letter' maxlength='1'>
<button onclick='guessLetter()'>Letra</button>
<input id='full'>
<button onclick='guessWord()'>Palavra</button>
</div>

<script src='/socket.io/socket.io.js'></script>
<script src='app.js'></script>
</body>
</html>
