
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forca v12</title>
<style>
body{background:#0f172a;color:#fff;font-family:Arial;text-align:center}
.card{background:#1e293b;margin:10px;padding:10px;border-radius:12px}
button,input{margin:5px;padding:10px;border-radius:8px}
</style>
</head>
<body>
<h2>Forca v12 PRO</h2>

<div id="menu">
<input id="name" placeholder="Nome"><br>
<input id="room" placeholder="Sala"><br>
<button onclick="joinRoom()">Entrar</button>
</div>

<div id="game" style="display:none">
<h3 id="players"></h3>
<h4 id="status"></h4>

<input id="word"><button onclick="setWord()">Salvar Palavra</button>

<div id="boards"></div>

<input id="letter" maxlength="1">
<button onclick="guessLetter()">Letra</button>

<input id="wordGuess">
<button onclick="guessWord()">Palavra</button>

<h3>Ranking</h3>
<div id="scores"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
